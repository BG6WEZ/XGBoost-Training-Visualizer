name: Performance Benchmark (Linux)

on:
  workflow_dispatch:
    inputs:
      task_id:
        description: 'Task ID (e.g., M7-T96)'
        required: true
        default: 'M7-T96'

jobs:
  benchmark:
    name: Performance Benchmark on Ubuntu
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install benchmark dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx

      - name: Environment info
        run: |
          echo "=== Environment Info ==="
          uname -a
          cat /etc/os-release
          echo "Python: $(python --version)"
          echo "CPU: $(nproc) cores"
          echo "Memory: $(free -h | grep Mem)"
          echo "========================"

      - name: Start services with Docker Compose
        run: |
          docker compose -f docker/docker-compose.yml up -d
          echo "Running database migrations..."
          docker compose -f docker/docker-compose.yml exec -T api python -m alembic upgrade head
          echo "Restarting API to run init_db after migrations..."
          docker compose -f docker/docker-compose.yml restart api
          echo "Waiting for services to be ready..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8000/ready > /dev/null 2>&1; then
              echo "Service ready after $i seconds"
              break
            fi
            sleep 1
          done
          # Additional warmup time after restart
          echo "Additional warmup period (10 seconds)..."
          sleep 10

      - name: Run benchmark
        run: |
          python scripts/benchmark.py --base-url http://localhost:8000
          echo "Exit code: $?"

      - name: Show Docker logs on failure
        if: failure()
        run: |
          docker compose -f docker/docker-compose.yml logs --tail=50 api

      - name: Show Docker status
        run: |
          docker compose -f docker/docker-compose.yml ps
