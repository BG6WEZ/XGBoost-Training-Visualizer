version: '3.8'

services:
  # 前端服务
  frontend:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://api:4000
      - VITE_WS_URL=ws://api:4000
    depends_on:
      - api
    networks:
      - app-network

  # API 服务
  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://xgboost:password@postgres:5432/xgboost_viz
      - REDIS_URL=redis://redis:6379
      - PYTHON_SERVICE_URL=http://trainer:8000
      - JWT_SECRET=your_jwt_secret_key
      - UPLOAD_DIR=/app/uploads
      - MAX_FILE_SIZE_MB=1024
      - MAX_CONCURRENT_TRAININGS=3
    volumes:
      - app-uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      trainer:
        condition: service_started
    networks:
      - app-network

  # 训练服务
  trainer:
    build:
      context: ../apps/trainer
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://xgboost:password@postgres:5432/xgboost_viz
      - STORAGE_PATH=/app/data
      - NUM_WORKERS=3
    volumes:
      - app-data:/app/data
      - app-uploads:/app/uploads:ro
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G
    networks:
      - app-network

  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=xgboost
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=xgboost_viz
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xgboost -d xgboost_viz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # Redis
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # Nginx 反向代理 (生产环境)
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - api
    networks:
      - app-network

volumes:
  postgres-data:
  redis-data:
  app-data:
  app-uploads:

networks:
  app-network:
    driver: bridge