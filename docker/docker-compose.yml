version: '3.8'

services:
  # 前端服务
  frontend:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://api:8000
    depends_on:
      - api
    networks:
      - xgboost-net

  # API 服务 (FastAPI)
  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://xgboost:xgboost123@postgres:5432/xgboost_vis
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=xgboost-vis
      - MINIO_SECURE=false
      - WORKSPACE_DIR=/app/workspace
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    networks:
      - xgboost-net
    volumes:
      - ../dataset:/app/dataset:ro
      - workspace-data:/app/workspace

  # Worker 服务
  worker:
    build:
      context: ../apps/worker
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql://xgboost:xgboost123@postgres:5432/xgboost_vis
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=xgboost-vis
      - MINIO_SECURE=false
      - WORKSPACE_DIR=/app/workspace
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    networks:
      - xgboost-net
    volumes:
      - ../dataset:/app/dataset:ro
      - workspace-data:/app/workspace

  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=xgboost
      - POSTGRES_PASSWORD=xgboost123
      - POSTGRES_DB=xgboost_vis
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - xgboost-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xgboost -d xgboost_vis"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - xgboost-net

  # MinIO 对象存储
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio-data:/data
    networks:
      - xgboost-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

networks:
  xgboost-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  minio-data:
  workspace-data: