events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    gzip  on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # 上传文件大小限制（500MB）
    client_max_body_size 500M;

    server {
        listen 3000;
        server_name localhost;

        root /usr/share/nginx/html;
        index index.html;

        # 安全响应头
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # SPA 路由支持
        location / {
            try_files $uri $uri/ /index.html;
        }

        # API 代理
        # 使用变量延迟解析，允许 nginx -t 在无 compose 网络时通过
        set $api_backend http://api:8000;
        location /api/ {
            proxy_pass $api_backend/api/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;

            # 代理超时配置（训练提交等请求可能较慢）
            proxy_read_timeout 300s;
            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
        }

        # WebSocket 代理
        set $ws_backend http://api:8000;
        location /ws/ {
            proxy_pass $ws_backend/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;

            # WebSocket 超时配置
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # 静态资源缓存
        # 仅使用 add_header 避免与 expires 产生双 Cache-Control 头
        # js/css 文件使用长期缓存（Vite 构建文件名含 hash）
        location ~* \.(js|css)$ {
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # 图片、字体、SVG 等静态资源
        location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            add_header Cache-Control "public, max-age=31536000";
        }
    }
}