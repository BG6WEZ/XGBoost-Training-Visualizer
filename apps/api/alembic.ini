# Alembic configuration for XGBoost Training Visualizer API

[alembic]
# Path to migration scripts
script_location = alembic

# Template used to generate migration file names
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Timezone for generating revision timestamps
# timezone =

# The maximum length a chapter name can have before it is truncated
# truncate_slug_length = 

# sys.path path, will be prepended to sys.path if present
prepend_sys_path = .

# Database URL - will be overridden by env.py from app settings
# sqlalchemy.url = driver://user:pass@localhost/dbname

# Set to 'true' to have alembic log SQL statements
sqlalchemy.url = postgresql+asyncpg://placeholder:placeholder@localhost:5432/placeholder

[post_write_hooks]
# post_write_hooks defines scripts or Python functions that are run
# on newly generated revision files.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S